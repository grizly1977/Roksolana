<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Заказ Август 2026 — Roksolana</title>
  <style>
    :root {
      --dark:      #070710;
      --dark2:     #111128;
      --gold:      #d4a853;
      --gold2:     #f0c870;
      --bg:        #f4f5f8;
      --white:     #ffffff;
      --border:    #e4e4ec;
      --text:      #1a1a2e;
      --text2:     #5a5a78;
      --text3:     #9898b0;
      --new-bg:    rgba(212,168,83,.07);
      --new-bdr:   rgba(212,168,83,.30);
      --radius:    12px;
      --shadow:    0 2px 14px rgba(0,0,0,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-bottom: max(env(safe-area-inset-bottom), 32px);
    }

    /* ── Header ── */
    .hdr {
      background: var(--dark);
      padding: 18px 20px 14px;
      padding-top: max(env(safe-area-inset-top), 18px);
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-brand {
      font-size: 10px; letter-spacing: 5px;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 3px;
    }
    .hdr-title {
      font-size: 17px; font-weight: 700;
      color: #fff; letter-spacing: -.3px;
    }

    /* ── Tabs ── */
    .tabs {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky; z-index: 99;
      display: flex; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      padding: 13px 16px 11px;
      font-size: 13px; font-weight: 600;
      color: var(--text2); cursor: pointer;
      white-space: nowrap;
      border-bottom: 2.5px solid transparent;
      transition: color .2s, border-color .2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tab .cnt {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: 9px; background: var(--border);
      font-size: 10px; font-weight: 700; color: var(--text2);
      margin-left: 5px; transition: background .2s, color .2s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--gold); }
    .tab.active .cnt { background: var(--gold); color: #fff; }

    /* ── Content ── */
    .content {
      padding: 16px; max-width: 960px; margin: 0 auto;
    }
    .section { display: none; }
    .section.active {
      display: block;
      animation: fadeUp .22s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Product card ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid transparent;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card.is-new {
      background: var(--new-bg);
      border-color: var(--new-bdr);
    }

    .card-head {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .card.is-new .card-head { border-bottom-color: var(--new-bdr); }

    .prod-name {
      font-size: 14px; font-weight: 700;
      color: var(--text); letter-spacing: -.2px;
    }
    .badge-new {
      font-size: 10px; font-weight: 700; letter-spacing: .4px;
      color: var(--gold);
      background: rgba(212,168,83,.12);
      border: 1px solid rgba(212,168,83,.30);
      padding: 2px 8px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Size row ── */
    .srow {
      display: flex; align-items: center;
      padding: 9px 14px; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .srow:last-child { border-bottom: none; }
    .card.is-new .srow { border-bottom-color: var(--new-bdr); }

    .sz {
      font-size: 11px; font-weight: 700; color: var(--text2);
      background: var(--bg); padding: 3px 7px;
      border-radius: 6px; min-width: 44px;
      text-align: center; flex-shrink: 0;
    }
    .qty {
      font-size: 13px; font-weight: 700; color: var(--text);
      min-width: 52px; flex-shrink: 0;
    }
    .qty em {
      font-size: 10px; font-style: normal;
      font-weight: 400; color: var(--text3); margin-left: 2px;
    }
    .swatches {
      display: flex; flex-wrap: wrap; gap: 5px; flex: 1;
    }
    .sw {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.14);
      transition: transform .15s;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .sw:hover  { transform: scale(1.25); }
    .sw:active { transform: scale(.9); }
    .sw-tbd {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px dashed var(--text3);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text3); flex-shrink: 0;
      font-weight: 700;
    }
    .sw-note {
      font-size: 11px; color: var(--text2);
      font-style: italic; letter-spacing: -.1px;
    }

    /* ── Tooltip ── */
    .tt {
      position: fixed; z-index: 300;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.28);
      min-width: 140px;
      display: none;
      pointer-events: none;
    }
    .tt.on { display: block; pointer-events: auto; }
    .tt-swatch {
      width: 36px; height: 36px; border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
      margin-bottom: 8px;
    }
    .tt-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }
    .tt-hex  { font-size: 12px; color: var(--gold); font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: .5px; }
    .tt-hint {
      margin-top: 9px; font-size: 10px; color: rgba(255,255,255,.4);
      text-align: center; padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .tt-hint.ok { color: #7ec98a; }

    /* ── Footer ── */
    .ftr {
      background: var(--dark);
      padding: 24px 20px;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
    }
    .ftr-label {
      font-size: 10px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 16px;
    }
    .totals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .tc {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px; padding: 14px;
    }
    .tc-lbl { font-size: 11px; color: rgba(255,255,255,.4); margin-bottom: 5px; }
    .tc-val {
      font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -.5px;
    }
    .tc-val span { font-size: 11px; font-weight: 400; color: var(--gold); margin-left: 2px; }
    .grand {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex; justify-content: space-between; align-items: center;
    }
    .grand-lbl { font-size: 13px; color: rgba(255,255,255,.55); }
    .grand-val { font-size: 26px; font-weight: 700; color: var(--gold2); letter-spacing: -.5px; }

    /* ── All tab ── */
    .all-section-title {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--text2); margin: 20px 0 10px;
    }
    .all-totals-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .all-total-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px;
    }
    .atc-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .atc-val { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.4px; }
    .atc-val span { font-size: 10px; font-weight: 400; color: var(--text3); margin-left: 2px; }
    .all-color-group {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 12px 14px; margin-bottom: 8px;
    }
    .acg-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .acg-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .acg-row:last-child { border-bottom: none; }
    .acg-name { font-size: 12px; color: var(--text); flex: 1; }
    .acg-qty { font-size: 13px; font-weight: 700; color: var(--text); }
    .acg-qty em { font-size: 10px; font-style: normal; font-weight: 400; color: var(--text3); margin-left: 2px; }
    .all-table-wrap { border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .all-table { width: 100%; border-collapse: collapse; background: var(--white); }
    .all-table th {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text2); padding: 9px 12px; background: var(--bg);
      text-align: left; border-bottom: 1px solid var(--border);
    }
    .all-table td { font-size: 12px; padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .all-table tr:last-child td { border-bottom: none; }
    .atr-cat td { background: var(--dark); color: var(--gold); font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; padding: 5px 12px; }
    .at-qty { font-weight: 700; }
    .at-unit { font-size: 10px; color: var(--text3); margin-left: 2px; }

    /* ── Desktop ── */
    @media (min-width: 700px) {
      .all-totals-grid { grid-template-columns: repeat(5, 1fr); }
      .hdr { padding: 20px 32px 16px; }
      .hdr-title { font-size: 19px; }
      .content { padding: 24px 32px; }
      .ftr { padding: 28px 32px; padding-bottom: 32px; }
      .totals { grid-template-columns: repeat(4, 1fr); }
      .card-head { padding: 13px 18px 11px; }
      .prod-name { font-size: 15px; }
      .srow { padding: 10px 18px; gap: 14px; }
      .sz { min-width: 52px; font-size: 12px; }
      .qty { font-size: 14px; min-width: 60px; }
      .sw, .sw-tbd { width: 24px; height: 24px; }
    }
  </style>

  function groupBy(items) {
    const map = new Map();
    items.forEach(r => {
      if (!map.has(r.p)) map.set(r.p, { p: r.p, n: r.n, rows: [] });
      map.get(r.p).rows.push(r);
    });
    return [...map.values()];
  }

  function colorStats(items) {
    const map = new Map();
    const notes = [];
    items.forEach(r => {
      if (r.note) { notes.push(r); return; }
      r.c.forEach(c => {
        if (!map.has(c.h)) map.set(c.h, {t: c.t, qty: 0, u: r.u});
        map.get(c.h).qty += r.q;
      });
    });
    return {
      colors: [...map.entries()].map(([h, v]) => ({h, ...v})).sort((a, b) => b.qty - a.qty),
      notes
    };
  }

  function buildAllSection() {
    const wool   = CATS.find(c => c.id === 'wool').items;
    const cotton = CATS.find(c => c.id === 'cotton').items;
    const diab   = CATS.find(c => c.id === 'diab').items;
    const allT   = CATS.find(c => c.id === 'tights').items;
    const woolT  = allT.filter(r => r.p === 'Wool Tights');
    const bambT  = allT.filter(r => r.p === 'Bamboo Tights');
    const sum = arr => arr.reduce((s, r) => s + r.q, 0);

    let h = '<div class="section" id="s-all">';

    // 1. Category totals
    h += `<div class="all-section-title" style="margin-top:0">Итого по категориям</div>
    <div class="all-totals-grid">
      <div class="all-total-card"><div class="atc-lbl">Шерстяные носки</div><div class="atc-val">${sum(wool)}<span>dz</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">Диабетические</div><div class="atc-val">${sum(diab)}<span>dz</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">Носки Житомир</div><div class="atc-val">${sum(cotton)}<span>dz</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">Колготки Шерсть</div><div class="atc-val">${sum(woolT)}<span>шт</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">Колготки Бамбук</div><div class="atc-val">${sum(bambT)}<span>шт</span></div></div>
    </div>`;

    // 2. Color breakdown per group
    const groups = [
      {label: 'Шерстяные носки', items: wool, unit: 'dz'},
      {label: 'Диабетические', items: diab, unit: 'dz'},
      {label: 'Носки Житомир', items: cotton, unit: 'dz'},
      {label: 'Колготки Шерсть', items: woolT, unit: 'шт'},
      {label: 'Колготки Бамбук', items: bambT, unit: 'шт'},
    ];
    h += `<div class="all-section-title">Цвета по категориям</div>`;
    groups.forEach(({label, items, unit}) => {
      const {colors, notes} = colorStats(items);
      h += `<div class="all-color-group"><div class="acg-title">${label}</div>`;
      colors.forEach(c => {
        h += `<div class="acg-row">
          <span class="sw" style="background:${c.h}" data-h="${c.h}" data-t="${c.t}"></span>
          <span class="acg-name">${c.t}</span>
          <span class="acg-qty">${c.qty}<em>${unit}</em></span>
        </div>`;
      });
      notes.forEach(r => {
        h += `<div class="acg-row">
          <span class="sw-tbd">?</span>
          <span class="acg-name" style="font-style:italic;color:var(--text2)">${r.p} · ${r.s} — По предыдущему заказу</span>
          <span class="acg-qty">${r.q}<em>${r.u}</em></span>
        </div>`;
      });
      h += '</div>';
    });

    // 3. Detailed table
    h += `<div class="all-section-title">Детально · весь заказ</div>
    <div class="all-table-wrap"><table class="all-table">
      <thead><tr><th>Продукт</th><th>Размер</th><th>Кол-во</th><th>Цвета</th></tr></thead>
      <tbody>`;
    CATS.forEach(cat => {
      h += `<tr class="atr-cat"><td colspan="4">${cat.name}</td></tr>`;
      cat.items.forEach(r => {
        h += `<tr>
          <td>${r.p}</td>
          <td><span class="sz" style="min-width:auto">${r.s}</span></td>
          <td><span class="at-qty">${r.q}</span><span class="at-unit">${r.u}</span></td>
          <td><div class="swatches">${swatchesHTML(r)}</div></td>
        </tr>`;
      });
    });
    h += '</tbody></table></div></div>';
    return h;
  }

  function swatchesHTML(row) {
    if (row.note) return `<span class="sw-note">${row.note}</span>`;
    if (!row.c.length) return '<span class="sw-tbd">?</span>';
    return row.c.map(c =>
      `<span class="sw" style="background:${c.h}" data-h="${c.h}" data-t="${c.t}"></span>`
    ).join('');
  }

  function buildSection(cat) {
    const groups = groupBy(cat.items);
    let h = `<div class="section" id="s-${cat.id}">`;
    groups.forEach(g => {
      h += `<div class="card${g.n ? ' is-new' : ''}">`;
      h += `<div class="card-head"><span class="prod-name">${g.p}</span>${g.n ? '<span class="badge-new">✦ Новинка</span>' : ''}</div>`;
      g.rows.forEach(r => {
        h += `<div class="srow">
          <span class="sz">${r.s}</span>
          <span class="qty">${r.q}<em>${r.u}</em></span>
          <div class="swatches">${swatchesHTML(r)}</div>
        </div>`;
      });
      h += '</div>';
    });
    return h + '</div>';
  }

  $(function () {
    const $tabs = $('#tabs'), $content = $('#content');

    // "Все" tab
    const totalProds = CATS.reduce((s, c) => s + new Set(c.items.map(r => r.p)).size, 0);
    $tabs.append(`<div class="tab active" data-id="all">Все<span class="cnt">${totalProds}</span></div>`);
    $content.append($(buildAllSection()).addClass('active'));

    // Category tabs + sections
    CATS.forEach(cat => {
      const unique = new Set(cat.items.map(r => r.p)).size;
      $tabs.append(`<div class="tab" data-id="${cat.id}">${cat.name}<span class="cnt">${unique}</span></div>`);
      $content.append($(buildSection(cat)));
    });

    // Sticky tabs offset
    const hdrH = $('.hdr').outerHeight();
    $('.tabs').css('top', hdrH);

    // Tab switch
    $tabs.on('click', '.tab', function () {
      const id = $(this).data('id');
      $('.tab').removeClass('active');
      $(this).addClass('active');
      $('.section').removeClass('active');
      $(`#s-${id}`).addClass('active');
      hideTooltip();
      renderFooter(id);
      window.scrollTo({ top: hdrH + $('.tabs').outerHeight(), behavior: 'smooth' });
    });

    // Footer
    function renderFooter(catId) {
      if (catId === 'all') {
        const pos   = CATS.reduce((s, c) => s + c.items.length, 0);
        const prods = CATS.reduce((s, c) => s + new Set(c.items.map(r => r.p)).size, 0);
        $('#ftr').html(`
          <div class="ftr-label">Итого · Весь заказ</div>
          <div class="totals" style="grid-template-columns:1fr 1fr">
            <div class="tc"><div class="tc-lbl">Позиций</div><div class="tc-val">${pos}</div></div>
            <div class="tc"><div class="tc-lbl">Продуктов</div><div class="tc-val">${prods}</div></div>
          </div>
        `);
        return;
      }
      const cat = CATS.find(c => c.id === catId);
      const total = cat.items.reduce((s, r) => s + r.q, 0);
      const unit  = cat.items[0]?.u || 'dz';
      const prods = new Set(cat.items.map(r => r.p)).size;
      $('#ftr').html(`
        <div class="ftr-label">Итого · ${cat.name}</div>
        <div class="totals" style="grid-template-columns:1fr 1fr">
          <div class="tc">
            <div class="tc-lbl">Количество</div>
            <div class="tc-val">${total}<span>${unit}</span></div>
          </div>
          <div class="tc">
            <div class="tc-lbl">Наименований</div>
            <div class="tc-val">${prods}</div>
          </div>
        </div>
      `);
    }
    renderFooter('all');

    // Tooltip
    const $tt = $('#tt'), $sw = $('#tt-sw'), $nm = $('#tt-nm'), $hx = $('#tt-hx'), $ht = $('#tt-ht');
    let $active = null;

    function showTT($el) {
      const hex = $el.data('h'), name = $el.data('t');
      $sw.css('background', hex);
      $nm.text(name);
      $hx.text(hex.toUpperCase());
      $ht.text('нажмите чтобы скопировать').removeClass('ok');
      $tt.addClass('on');
      $active = $el;

      const r = $el[0].getBoundingClientRect();
      const tw = $tt.outerWidth(), th = $tt.outerHeight();
      const vw = window.innerWidth, vh = window.innerHeight;
      let left = r.left + r.width / 2 - tw / 2;
      let top  = r.top - th - 10;
      if (top < 8) top = r.bottom + 10;
      if (left < 8) left = 8;
      if (left + tw > vw - 8) left = vw - tw - 8;
      $tt.css({ left, top });
    }

    function hideTooltip() { $tt.removeClass('on'); $active = null; }

    $(document).on('click', '.sw', function (e) {
      e.stopPropagation();
      if ($active && $active.is(this)) { hideTooltip(); return; }
      showTT($(this));
    });

    $tt.on('click', function () {
      const hex = $hx.text();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(hex).then(() => {
          $ht.text('Скопировано ✓').addClass('ok');
          setTimeout(hideTooltip, 900);
        });
      } else { hideTooltip(); }
    });

    $(document).on('click', function (e) {
      if (!$(e.target).hasClass('sw') && !$tt.is(e.target) && !$tt.has(e.target).length) {
        hideTooltip();
      }
    });
  });
  </script>
</body>
</html>
