<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sipariş Ağustos 2026 — Roksolana</title>
  <style>
    :root {
      --dark:      #070710;
      --dark2:     #111128;
      --gold:      #d4a853;
      --gold2:     #f0c870;
      --bg:        #f4f5f8;
      --white:     #ffffff;
      --border:    #e4e4ec;
      --text:      #1a1a2e;
      --text2:     #5a5a78;
      --text3:     #9898b0;
      --new-bg:    rgba(212,168,83,.07);
      --new-bdr:   rgba(212,168,83,.30);
      --radius:    12px;
      --shadow:    0 2px 14px rgba(0,0,0,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-bottom: max(env(safe-area-inset-bottom), 32px);
    }

    /* ── Header ── */
    .hdr {
      background: var(--dark);
      padding: 18px 20px 14px;
      padding-top: max(env(safe-area-inset-top), 18px);
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; row-gap: 10px;
    }
    .hdr-left { display: flex; flex-direction: column; }
    .hdr-brand {
      font-size: 10px; letter-spacing: 5px;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 3px;
    }
    .hdr-title {
      font-size: 17px; font-weight: 700;
      color: #fff; letter-spacing: -.3px;
    }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .lang-select {
      color-scheme: dark;
      font-family: inherit; font-size: 11px; font-weight: 700;
      color: var(--gold2);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      padding: 7px 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .2s, border-color .2s;
    }
    .lang-select:hover { background: rgba(255,255,255,.1); border-color: rgba(212,168,83,.35); }
    .lang-select:focus { outline: none; border-color: var(--gold); }
    .hdr-pdf {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      background: rgba(212,168,83,.15); border: 1px solid rgba(212,168,83,.35);
      color: var(--gold); font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: background .2s, border-color .2s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .hdr-pdf:hover { background: rgba(212,168,83,.25); border-color: var(--gold); }
    .hdr-pdf svg { flex-shrink: 0; }

    @media (max-width: 380px) {
      .hdr-right { width: 100%; justify-content: space-between; }
    }

    /* ── Print ── */
    @media print {
      .hdr, .tabs, .ftr, .tt, .lbl-chip, .labels-block, .labels-title { display: none !important; }
      .section { display: block !important; animation: none !important; }
      body { background: #fff; padding: 0; }
      .content { padding: 8px; max-width: 100%; }
      .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
      .sw { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    /* ── Tabs ── */
    .tabs {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky; z-index: 99;
      display: flex; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      padding: 13px 16px 11px;
      font-size: 13px; font-weight: 600;
      color: var(--text2); cursor: pointer;
      white-space: nowrap;
      border-bottom: 2.5px solid transparent;
      transition: color .2s, border-color .2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tab .cnt {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: 9px; background: var(--border);
      font-size: 10px; font-weight: 700; color: var(--text2);
      margin-left: 5px; transition: background .2s, color .2s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--gold); }
    .tab.active .cnt { background: var(--gold); color: #fff; }

    /* ── Content ── */
    .content {
      padding: 16px; max-width: 960px; margin: 0 auto;
    }
    .section { display: none; }
    .section.active {
      display: block;
      animation: fadeUp .22s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Product card ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid transparent;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card.is-new {
      background: var(--new-bg);
      border-color: var(--new-bdr);
    }

    .card-head {
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; row-gap: 6px; column-gap: 10px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .card.is-new .card-head { border-bottom-color: var(--new-bdr); }

    .prod-name {
      font-size: 14px; font-weight: 700;
      color: var(--text); letter-spacing: -.2px;
    }
    .card-head-right {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap;
    }
    .badge-new {
      font-size: 10px; font-weight: 700; letter-spacing: .4px;
      color: var(--gold);
      background: rgba(212,168,83,.12);
      border: 1px solid rgba(212,168,83,.30);
      padding: 2px 8px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Label download chip ── */
    .lbl-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--dark); color: var(--gold2);
      font-size: 10px; font-weight: 700; letter-spacing: .4px;
      padding: 5px 10px; border-radius: 20px;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
      transition: background .2s, color .2s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .lbl-chip:hover  { background: var(--gold); color: var(--dark); }
    .lbl-chip:active { transform: scale(.94); }
    .lbl-chip svg { flex-shrink: 0; }

    /* ── Labels block (All tab) ── */
    .labels-block {
      background: var(--dark);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .lblr {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,.06);
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .lblr:last-child { border-bottom: none; }
    .lblr:hover { background: rgba(212,168,83,.08); }
    .lblr-ic {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: rgba(212,168,83,.12);
      border: 1px solid rgba(212,168,83,.25);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      transition: background .2s, color .2s;
    }
    .lblr:hover .lblr-ic { background: var(--gold); color: var(--dark); }
    .lblr-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .lblr-name { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: -.2px; }
    .lblr-meta { font-size: 11px; color: rgba(255,255,255,.45); }
    .lblr-size { font-size: 11px; font-weight: 600; color: var(--gold); white-space: nowrap; flex-shrink: 0; }

    /* ── Size row ── */
    .srow {
      display: flex; align-items: center;
      padding: 9px 14px; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .srow:last-child { border-bottom: none; }
    .card.is-new .srow { border-bottom-color: var(--new-bdr); }

    .sz {
      font-size: 11px; font-weight: 700; color: var(--text2);
      background: var(--bg); padding: 3px 7px;
      border-radius: 6px; min-width: 44px;
      text-align: center; flex-shrink: 0;
    }
    .qty {
      font-size: 13px; font-weight: 700; color: var(--text);
      min-width: 52px; flex-shrink: 0;
    }
    .qty em {
      font-size: 10px; font-style: normal;
      font-weight: 400; color: var(--text3); margin-left: 2px;
    }
    .swatches {
      display: flex; flex-wrap: wrap; gap: 5px; flex: 1;
    }
    .sw {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.14);
      transition: transform .15s;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .sw:hover  { transform: scale(1.25); }
    .sw:active { transform: scale(.9); }
    .sw-tbd {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px dashed var(--text3);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text3); flex-shrink: 0;
      font-weight: 700;
    }
    .sw-note {
      font-size: 11px; color: var(--text2);
      font-style: italic; letter-spacing: -.1px;
    }

    /* ── Tooltip ── */
    .tt {
      position: fixed; z-index: 300;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.28);
      min-width: 140px;
      display: none;
      pointer-events: none;
    }
    .tt.on { display: block; pointer-events: auto; }
    .tt-swatch {
      width: 36px; height: 36px; border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
      margin-bottom: 8px;
    }
    .tt-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }
    .tt-hex  { font-size: 12px; color: var(--gold); font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: .5px; }
    .tt-hint {
      margin-top: 9px; font-size: 10px; color: rgba(255,255,255,.4);
      text-align: center; padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .tt-hint.ok { color: #7ec98a; }

    /* ── Footer ── */
    .ftr {
      background: var(--dark);
      padding: 24px 20px;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
    }
    .ftr-label {
      font-size: 10px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 16px;
    }
    .totals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .tc {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px; padding: 14px;
    }
    .tc-lbl { font-size: 11px; color: rgba(255,255,255,.4); margin-bottom: 5px; }
    .tc-val {
      font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -.5px;
    }
    .tc-val span { font-size: 11px; font-weight: 400; color: var(--gold); margin-left: 2px; }
    .grand {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex; justify-content: space-between; align-items: center;
    }
    .grand-lbl { font-size: 13px; color: rgba(255,255,255,.55); }
    .grand-val { font-size: 26px; font-weight: 700; color: var(--gold2); letter-spacing: -.5px; }

    /* ── All tab ── */
    .all-section-title {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--text2); margin: 20px 0 10px;
    }
    .all-totals-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .all-total-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px;
    }
    .atc-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .atc-val { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.4px; }
    .atc-val span { font-size: 10px; font-weight: 400; color: var(--text3); margin-left: 2px; }
    .all-color-group {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 12px 14px; margin-bottom: 8px;
    }
    .acg-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .acg-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .acg-row:last-child { border-bottom: none; }
    .acg-name { font-size: 12px; color: var(--text); flex: 1; }
    .acg-qty { font-size: 13px; font-weight: 700; color: var(--text); }
    .acg-qty em { font-size: 10px; font-style: normal; font-weight: 400; color: var(--text3); margin-left: 2px; }
    .all-table-wrap { border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .all-table { width: 100%; border-collapse: collapse; background: var(--white); }
    .all-table th {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text2); padding: 9px 12px; background: var(--bg);
      text-align: left; border-bottom: 1px solid var(--border);
    }
    .all-table td { font-size: 12px; padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .all-table tr:last-child td { border-bottom: none; }
    .atr-cat td { background: var(--dark); color: var(--gold); font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; padding: 5px 12px; }
    .at-qty { font-weight: 700; }
    .at-unit { font-size: 10px; color: var(--text3); margin-left: 2px; }

    /* ── Desktop ── */
    @media (min-width: 700px) {
      .all-totals-grid { grid-template-columns: repeat(3, 1fr); }
      .hdr { padding: 20px 32px 16px; }
      .hdr-title { font-size: 19px; }
      .content { padding: 24px 32px; }
      .ftr { padding: 28px 32px; padding-bottom: 32px; }
      .totals { grid-template-columns: repeat(4, 1fr); }
      .card-head { padding: 13px 18px 11px; }
      .prod-name { font-size: 15px; }
      .srow { padding: 10px 18px; gap: 14px; }
      .sz { min-width: 52px; font-size: 12px; }
      .qty { font-size: 14px; min-width: 60px; }
      .sw, .sw-tbd { width: 24px; height: 24px; }
    }
  </style>
</head>

  const DL_ICON_SM = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><polyline points="7 10 12 15 17 10"/><line x1="4" y1="21" x2="20" y2="21"/></svg>';

  function labelChipsHTML(p) {

  const COLORS_LXL = [{h:'#231F20',k:'processBlack'},{h:'#1C2C5F',k:'pantone655'},{h:'#717073',k:'pantone7540'},{h:'#4A5769',k:'pantone7546'}];

        { p:'Zhytomyr Cotton', s:'S/M',  q:60,  u:'dz', n:false, c:[{h:'#FFFFFF',k:'classicWhite'},{h:'#0A0A0A',k:'jetBlack'},{h:'#9E9E9E',k:'greyHeather'},{h:'#879884',k:'sageGreen'},{h:'#1C2C5F',k:'pantone655'},{h:'#3D1A5C',k:'pantone2695'}] },

    },

        { p:'Diabetic Cotton',  s:'S/M',     q:200, u:'dz', n:false, c:COLORS_SM },
        { p:'Diabetic Cotton',  s:'M/L',     q:400, u:'dz', n:false, c:[{h:'#111111',k:'black'},{h:'#4880A0',k:'steelBlue'},{h:'#907050',k:'brown'},{h:'#F5F5F5',k:'white'},{h:'#D8C8A0',k:'beige'},{h:'#C0C0C0',k:'lightGrey'}] },
        { p:'Diabetic Cotton',  s:'L/XL',    q:400, u:'dz', n:false, c:COLORS_LXL },
        { p:'Diabetic Cotton',  s:'S/M',  q:50,  u:'dz', n:false, variant:'black', c:[{h:'#111111',k:'black'}] },
        { p:'Diabetic Cotton',  s:'M/L',  q:100, u:'dz', n:false, variant:'black', c:[{h:'#111111',k:'black'}] },
        { p:'Diabetic Cotton',  s:'L/XL', q:100, u:'dz', n:false, variant:'black', c:[{h:'#111111',k:'black'}] },
        { p:'Diabetic Lavender',s:'S/M',     q:50,  u:'dz', n:false, c:COLORS_SM },
        { p:'Diabetic Lavender',s:'M/L',     q:100, u:'dz', n:false, c:COLORS_SM },
        { p:'Diabetic Lavender',s:'L/XL',    q:100, u:'dz', n:false, c:COLORS_LXL },

    {

        { p:'Wool Tights',    s:'L',   q:126, u:'pcs', n:true, c:[{h:'#111111',k:'black'}] },

        { p:'Bamboo Tights',  s:'M',   q:30,  u:'pcs', n:true, c:[{h:'#111111',k:'black'}] },
        { p:'Bamboo Tights',  s:'L',   q:54,  u:'pcs', n:true, c:[{h:'#111111',k:'black'}] },

        { p:'Bamboo Tights',  s:'2XL', q:84,  u:'pcs', n:true, c:[{h:'#111111',k:'black'}] },

        { p:'Bamboo Tights',  s:'4XL', q:84,  u:'pcs', n:true, c:[{h:'#111111',k:'black'}] },
      ]
    }
  ];

  function prodKey(r) { return r.p + '|' + (r.variant || ''); }
  function colorName(key) { return COLOR_NAMES[key][lang]; }

  function groupBy(items) {
    const map = new Map();
    items.forEach(r => {
      const key = prodKey(r);
      if (!map.has(key)) map.set(key, { p: r.p, variant: r.variant, n: r.n, rows: [] });
      map.get(key).rows.push(r);
    });
    return [...map.values()];
  }

  function colorStats(items) {
    const map = new Map();
    const notes = [];
    items.forEach(r => {
      if (r.note) { notes.push(r); return; }
      r.c.forEach(c => {
        if (!map.has(c.k)) map.set(c.k, { h: c.h, qty: 0, u: r.u });
        map.get(c.k).qty += r.q;
      });
    });
    return {
      colors: [...map.entries()].map(([k, v]) => ({k, ...v})).sort((a, b) => b.qty - a.qty),
      notes
    };
  }

  function swatchesHTML(row) {
    if (row.note) return `<span class="sw-note">${STRINGS[lang].prevOrder}</span>`;
    if (!row.c.length) return '<span class="sw-tbd">?</span>';
    return row.c.map(c =>
      `<span class="sw" style="background:${c.h}" data-h="${c.h}" data-k="${c.k}"></span>`
    ).join('');
  }

  function buildSection(cat) {
    const S = STRINGS[lang];
    const groups = groupBy(cat.items);
    let h = `<div class="section" id="s-${cat.id}">`;
    groups.forEach(g => {
      const label = g.p + (g.variant ? ' · ' + S.variantBlack : '');
      const chips = g.variant ? '' : labelChipsHTML(g.p);
      const badge = g.n ? `<span class="badge-new">${S.badgeNew}</span>` : '';
      const right = (chips || badge) ? `<span class="card-head-right">${chips}${badge}</span>` : '';
      h += `<div class="card${g.n ? ' is-new' : ''}">`;
      h += `<div class="card-head"><span class="prod-name">${label}</span>${right}</div>`;
      g.rows.forEach(r => {
        h += `<div class="srow">
          <span class="sz">${r.s}</span>
          <span class="qty">${r.q}<em>${UNIT_LABELS[r.u][lang]}</em></span>
          <div class="swatches">${swatchesHTML(r)}</div>
        </div>`;
      });
      h += '</div>';
    });
    return h + '</div>';
  }

  function buildAllSection() {
    const S = STRINGS[lang];
    const wool   = CATS.find(c => c.id === 'wool').items;
    const cotton = CATS.find(c => c.id === 'cotton').items;
    const diab   = CATS.find(c => c.id === 'diab').items;
    const allT   = CATS.find(c => c.id === 'tights').items;
    const woolT  = allT.filter(r => r.p === 'Wool Tights');
    const woolL  = allT.filter(r => r.p === 'Wool Leggings');
    const bambT  = allT.filter(r => r.p === 'Bamboo Tights');
    const sum = arr => arr.reduce((s, r) => s + r.q, 0);

    let h = '<div class="section" id="s-all">';

    // 1. Category totals
    h += `<div class="all-section-title" style="margin-top:0">${S.sectionCatTotals}</div>
    <div class="all-totals-grid">
      <div class="all-total-card"><div class="atc-lbl">${S.groupLabels.wool}</div><div class="atc-val">${sum(wool)}<span>${UNIT_LABELS.dz[lang]}</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">${S.groupLabels.diab}</div><div class="atc-val">${sum(diab)}<span>${UNIT_LABELS.dz[lang]}</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">${S.groupLabels.cotton}</div><div class="atc-val">${sum(cotton)}<span>${UNIT_LABELS.dz[lang]}</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">${S.groupLabels.woolTights}</div><div class="atc-val">${sum(woolT)}<span>${UNIT_LABELS.pcs[lang]}</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">${S.groupLabels.woolLeggings}</div><div class="atc-val">${sum(woolL)}<span>${UNIT_LABELS.pcs[lang]}</span></div></div>
      <div class="all-total-card"><div class="atc-lbl">${S.groupLabels.bambTights}</div><div class="atc-val">${sum(bambT)}<span>${UNIT_LABELS.pcs[lang]}</span></div></div>
    </div>`;

    // 2. Labels download block
    h += `<div class="all-section-title labels-title">${S.sectionLabels}</div><div class="labels-block">`;
    LABELS.forEach(l => {
      h += `<a class="lblr" href="${LABELS_BASE}${l.file}" download>
        <span class="lblr-ic">${DL_ICON_LG}</span>
        <span class="lblr-main">
          <span class="lblr-name">${l.name}</span>
          <span class="lblr-meta">${l.note[lang]} · ${l.file}</span>
        </span>
        <span class="lblr-size">${l.mb} MB</span>
      </a>`;
    });
    h += '</div>';

    // 3. Color breakdown per group
    const groups = [
      {label: S.groupLabels.wool, items: wool, unit: 'dz'},
      {label: S.groupLabels.diab, items: diab, unit: 'dz'},
      {label: S.groupLabels.cotton, items: cotton, unit: 'dz'},
      {label: S.groupLabels.woolTights, items: woolT, unit: 'pcs'},
      {label: S.groupLabels.woolLeggings, items: woolL, unit: 'pcs'},
      {label: S.groupLabels.bambTights, items: bambT, unit: 'pcs'},
    ];
    h += `<div class="all-section-title">${S.sectionColorsByCat}</div>`;
    groups.forEach(({label, items, unit}) => {
      const {colors, notes} = colorStats(items);
      h += `<div class="all-color-group"><div class="acg-title">${label}</div>`;
      colors.forEach(c => {
        h += `<div class="acg-row">
          <span class="sw" style="background:${c.h}" data-h="${c.h}" data-k="${c.k}"></span>
          <span class="acg-name">${colorName(c.k)}</span>
          <span class="acg-qty">${c.qty}<em>${UNIT_LABELS[unit][lang]}</em></span>
        </div>`;
      });
      notes.forEach(r => {
        h += `<div class="acg-row">
          <span class="sw-tbd">?</span>
          <span class="acg-name" style="font-style:italic;color:var(--text2)">${r.p} · ${r.s} — ${S.prevOrder}</span>
          <span class="acg-qty">${r.q}<em>${UNIT_LABELS[r.u][lang]}</em></span>
        </div>`;
      });
      h += '</div>';
    });

    // 4. Detailed table
    h += `<div class="all-section-title">${S.sectionDetailed}</div>
    <div class="all-table-wrap"><table class="all-table">
      <thead><tr><th>${S.thProduct}</th><th>${S.thSize}</th><th>${S.thQty}</th><th>${S.thColors}</th></tr></thead>
      <tbody>`;
    CATS.forEach(cat => {
      h += `<tr class="atr-cat"><td colspan="4">${S.catNames[cat.id]}</td></tr>`;
      cat.items.forEach(r => {
        const label = r.p + (r.variant ? ' · ' + S.variantBlack : '');
        h += `<tr>
          <td>${label}</td>
          <td><span class="sz" style="min-width:auto">${r.s}</span></td>
          <td><span class="at-qty">${r.q}</span><span class="at-unit">${UNIT_LABELS[r.u][lang]}</span></td>
          <td><div class="swatches">${swatchesHTML(r)}</div></td>
        </tr>`;
      });
    });
    h += '</tbody></table></div></div>';
    return h;
  }

  function renderFooter(catId) {
    const S = STRINGS[lang];
    if (catId === 'all') {
      const pos   = CATS.reduce((s, c) => s + c.items.length, 0);
      const prods = CATS.reduce((s, c) => s + new Set(c.items.map(prodKey)).size, 0);
      $('#ftr').html(`
        <div class="ftr-label">${S.ftrAllTitle}</div>
        <div class="totals" style="grid-template-columns:1fr 1fr">
          <div class="tc"><div class="tc-lbl">${S.lblPositions}</div><div class="tc-val">${pos}</div></div>
          <div class="tc"><div class="tc-lbl">${S.lblProducts}</div><div class="tc-val">${prods}</div></div>
        </div>
      `);
      return;
    }
    const cat = CATS.find(c => c.id === catId);
    const total = cat.items.reduce((s, r) => s + r.q, 0);
    const unit  = UNIT_LABELS[cat.items[0]?.u || 'dz'][lang];
    const prods = new Set(cat.items.map(prodKey)).size;
    $('#ftr').html(`
      <div class="ftr-label">${S.ftrCatTitlePrefix}${S.catNames[catId]}</div>
      <div class="totals" style="grid-template-columns:1fr 1fr">
        <div class="tc">
          <div class="tc-lbl">${S.lblQty}</div>
          <div class="tc-val">${total}<span>${unit}</span></div>
        </div>
        <div class="tc">
          <div class="tc-lbl">${S.lblNames}</div>
          <div class="tc-val">${prods}</div>
        </div>
      </div>
    `);
  }

  function render() {
    document.documentElement.lang = lang;
    document.title = STRINGS[lang].docTitle;
    $('#hdrTitle').text(STRINGS[lang].headerTitle);
    $('#langSwitch').val(lang);

    const activeId = $('.tab.active').data('id') || 'all';

    const $tabs = $('#tabs').empty();
    const $content = $('#content').empty();

    const totalProds = CATS.reduce((s, c) => s + new Set(c.items.map(prodKey)).size, 0);
    $tabs.append(`<div class="tab${activeId === 'all' ? ' active' : ''}" data-id="all">${STRINGS[lang].tabAll}<span class="cnt">${totalProds}</span></div>`);
    const $allSection = $(buildAllSection());
    if (activeId === 'all') $allSection.addClass('active');
    $content.append($allSection);

    CATS.forEach(cat => {
      const unique = new Set(cat.items.map(prodKey)).size;
      $tabs.append(`<div class="tab${activeId === cat.id ? ' active' : ''}" data-id="${cat.id}">${STRINGS[lang].catNames[cat.id]}<span class="cnt">${unique}</span></div>`);
      const $sec = $(buildSection(cat));
      if (activeId === cat.id) $sec.addClass('active');
      $content.append($sec);
    });

    renderFooter(activeId);
  }

  $(function () {
    render();

    const hdrH = $('.hdr').outerHeight();
    $('.tabs').css('top', hdrH);

    // Tab switch
    $('#tabs').on('click', '.tab', function () {
      const id = $(this).data('id');
      $('.tab').removeClass('active');
      $(this).addClass('active');
      $('.section').removeClass('active');
      $(`#s-${id}`).addClass('active');
      hideTooltip();
      renderFooter(id);
      window.scrollTo({ top: hdrH + $('.tabs').outerHeight(), behavior: 'smooth' });
    });

    // Language switch
    $('#langSwitch').on('change', function () {
      const newLang = $(this).val();
      if (newLang === lang) return;
      lang = newLang;
      localStorage.setItem('roksolana_lang', lang);
      render();
    });

    // Tooltip
    const $tt = $('#tt'), $sw = $('#tt-sw'), $nm = $('#tt-nm'), $hx = $('#tt-hx'), $ht = $('#tt-ht');
    let $active = null;

    function showTT($el) {
      const hex = $el.data('h'), key = $el.data('k');
      $sw.css('background', hex);
      $nm.text(colorName(key));
      $hx.text(hex.toUpperCase());
      $ht.text(STRINGS[lang].ttHint).removeClass('ok');
      $tt.addClass('on');
      $active = $el;

      const r = $el[0].getBoundingClientRect();
      const tw = $tt.outerWidth(), th = $tt.outerHeight();
      const vw = window.innerWidth, vh = window.innerHeight;
      let left = r.left + r.width / 2 - tw / 2;
      let top  = r.top - th - 10;
      if (top < 8) top = r.bottom + 10;
      if (left < 8) left = 8;
      if (left + tw > vw - 8) left = vw - tw - 8;
      $tt.css({ left, top });
    }

    function hideTooltip() { $tt.removeClass('on'); $active = null; }

    $(document).on('click', '.sw', function (e) {
      e.stopPropagation();
      if ($active && $active.is(this)) { hideTooltip(); return; }
      showTT($(this));
    });

    $tt.on('click', function () {
      const hex = $hx.text();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(hex).then(() => {
          $ht.text(STRINGS[lang].ttCopied).addClass('ok');
          setTimeout(hideTooltip, 900);
        });
      } else { hideTooltip(); }
    });

    $(document).on('click', function (e) {
      if (!$(e.target).hasClass('sw') && !$tt.is(e.target) && !$tt.has(e.target).length) {
        hideTooltip();
      }
    });
  });
  </script>
