<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hello World — Roksolana</title>
  <style>
    :root {
      --gold:       #d4a853;
      --gold-light: #f0c870;
      --gold-pale:  rgba(212,168,83,0.15);
      --dark:       #070710;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { height: 100%; }

    body {
      min-height: 100dvh;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      padding:
        max(env(safe-area-inset-top), 40px)
        env(safe-area-inset-right)
        max(env(safe-area-inset-bottom), 40px)
        env(safe-area-inset-left);
    }

    /* ── Aurora ── */
    .aurora {
      position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: orbFloat linear infinite, orbFade ease-in-out 2s forwards;
    }
    .orb-1 {
      width: 420px; height: 280px;
      background: radial-gradient(circle, #5c1fff 0%, transparent 70%);
      top: -80px; left: -60px;
      animation-duration: 22s, 2s;
      animation-delay: 0.3s, 0.3s;
    }
    .orb-2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, #b8860b 0%, transparent 70%);
      bottom: -100px; right: -80px;
      animation-duration: 28s, 2s;
      animation-delay: 0.6s, 0.6s;
    }
    .orb-3 {
      width: 300px; height: 220px;
      background: radial-gradient(circle, #006680 0%, transparent 70%);
      top: 45%; left: 20%;
      animation-duration: 19s, 2s;
      animation-delay: 0.9s, 0.9s;
    }
    @keyframes orbFloat {
      0%   { transform: translate(0,   0)   rotate(0deg);   }
      25%  { transform: translate(60px, 80px)  rotate(90deg);  }
      50%  { transform: translate(-50px, 130px) rotate(180deg); }
      75%  { transform: translate(40px, -50px) rotate(270deg); }
      100% { transform: translate(0,   0)   rotate(360deg); }
    }
    @keyframes orbFade { to { opacity: 0.18; } }

    /* ── Stars canvas ── */
    #canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    /* ── Content ── */
    .wrap {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
      padding: 32px 24px; text-align: center;
    }

    /* Brand badge */
    .brand {
      font-size: 11px; letter-spacing: 7px;
      text-transform: uppercase; color: var(--gold);
      opacity: 0;
      animation: slideUp .7s ease forwards .4s;
    }

    /* Spinning emblem */
    .emblem-wrap {
      position: relative; width: 100px; height: 100px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      animation: slideUp .7s ease forwards .7s;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(212,168,83,.35);
      animation: ringPulse 3.2s ease-in-out infinite;
    }
    .ring:nth-child(1) { width: 80px;  height: 80px;  animation-delay: 0s; }
    .ring:nth-child(2) { width: 80px;  height: 80px;  animation-delay: 1.1s; }
    .ring:nth-child(3) { width: 80px;  height: 80px;  animation-delay: 2.2s; }
    @keyframes ringPulse {
      0%   { transform: scale(.9);  opacity: 0; }
      40%  { opacity: .6; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    .emblem-icon {
      width: 52px; height: 52px;
      filter: drop-shadow(0 0 18px rgba(212,168,83,.7));
    }

    /* Hello World letters */
    .hello-world {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 14px;
      line-height: 1;
    }
    .word {
      display: inline-flex;
      background: linear-gradient(135deg, #fff 0%, var(--gold-light) 45%, var(--gold) 100%);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      font-size: clamp(44px, 11vw, 66px);
      font-weight: 700; letter-spacing: -1px;
    }
    .letter {
      display: inline-block;
      opacity: 0; transform: translateY(48px) scale(.7);
      animation: letterPop .5s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    @keyframes letterPop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Tagline */
    .tagline {
      font-size: 15px; letter-spacing: 2px;
      color: rgba(255,255,255,.4);
      opacity: 0;
      animation: slideUp .7s ease forwards 3.4s;
    }

    /* Pulse dot */
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 18px var(--gold), 0 0 40px rgba(212,168,83,.4);
      opacity: 0;
      animation: slideUp .5s ease forwards 3.8s, dotPulse 2.2s ease-in-out infinite 3.8s;
    }
    @keyframes dotPulse {
      0%,100% { transform: scale(1);   opacity: 1; }
      50%      { transform: scale(2.2); opacity: .4; }
    }

    /* Shared reveal */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Touch ripple */
    .ripple {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 30;
      background: radial-gradient(circle, rgba(212,168,83,.45), transparent 70%);
      transform: scale(0);
      animation: rippleOut .9s ease-out forwards;
    }
    @keyframes rippleOut {
      to { transform: scale(5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="wrap">
    <div class="brand">Roksolana</div>

    <div class="emblem-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <svg class="emblem-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="22" stroke="#d4a853" stroke-width="1.2" stroke-dasharray="5 3" opacity=".6"/>
        <circle cx="26" cy="26" r="14" stroke="#d4a853" stroke-width="1" opacity=".4"/>
        <path d="M26 8 C18 14 18 20 26 26 C34 20 34 14 26 8Z" fill="#d4a853"/>
        <path d="M26 44 C34 38 34 32 26 26 C18 32 18 38 26 44Z" fill="#d4a853" opacity=".5"/>
        <circle cx="26" cy="26" r="3" fill="#f0c870"/>
      </svg>
    </div>

    <div class="hello-world" id="hw"></div>

    <div class="tagline">welcome to the future</div>
    <div class="dot"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    /* ── Stars + Shooting Stars ── */
    const cvs = document.getElementById('canvas');
    const ctx = cvs.getContext('2d');
    let W, H, stars = [], shoots = [];

    function resize() {
      W = cvs.width  = window.innerWidth;
      H = cvs.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 130; i++) stars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.3 + 0.2,
      a: Math.random(), s: Math.random() * .004 + .001,
      d: Math.random() > .5 ? 1 : -1
    });

    function addShoot() {
      shoots.push({
        x: Math.random() * W * .8,
        y: Math.random() * H * .4,
        len: Math.random() * 130 + 70,
        speed: Math.random() * 9 + 6,
        angle: Math.PI / 4 + (Math.random() - .5) * .4,
        alpha: 1,
        w: Math.random() * 1.5 + .4
      });
    }
    setInterval(addShoot, 2800);

    function frame() {
      ctx.clearRect(0, 0, W, H);

      stars.forEach(s => {
        s.a += s.s * s.d;
        if (s.a > 1 || s.a < .08) s.d *= -1;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,252,230,${s.a})`;
        ctx.fill();
      });

      shoots = shoots.filter(s => s.alpha > 0);
      shoots.forEach(s => {
        const grd = ctx.createLinearGradient(
          s.x, s.y,
          s.x - Math.cos(s.angle) * s.len,
          s.y - Math.sin(s.angle) * s.len
        );
        grd.addColorStop(0, `rgba(212,168,83,${s.alpha})`);
        grd.addColorStop(1, 'rgba(212,168,83,0)');
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - Math.cos(s.angle) * s.len, s.y - Math.sin(s.angle) * s.len);
        ctx.strokeStyle = grd;
        ctx.lineWidth = s.w;
        ctx.stroke();
        s.x += Math.cos(s.angle) * s.speed;
        s.y += Math.sin(s.angle) * s.speed;
        s.alpha -= .016;
      });

      requestAnimationFrame(frame);
    }
    frame();

    /* ── Letter Reveal via jQuery ── */
    $(function () {
      const words = ['Hello', 'World'];
      let delay = 1.2;

      words.forEach(word => {
        const $w = $('<span class="word">');
        [...word].forEach(ch => {
          $w.append(
            $('<span class="letter">').text(ch).css('animation-delay', delay.toFixed(2) + 's')
          );
          delay += 0.07;
        });
        $('#hw').append($w);
        delay += 0.2;
      });

      /* Touch / click ripple */
      $(document).on('touchstart click', function (e) {
        const t = e.originalEvent?.touches?.[0];
        const x = t ? t.clientX : e.clientX;
        const y = t ? t.clientY : e.clientY;
        const sz = 100;
        $('<div class="ripple">')
          .css({ width: sz, height: sz, left: x - sz / 2, top: y - sz / 2 })
          .appendTo('body')
          .one('animationend', function () { $(this).remove(); });
      });
    });
  </script>
</body>
</html>
